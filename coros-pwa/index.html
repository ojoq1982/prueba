<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Coros</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<link rel="manifest" href="manifest.json">

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif;
  background: #f2f2f2;
}

header {
  background: #2e7d32;
  color: white;
  padding: 12px;
  text-align: center;
  font-size: 18px;
  position: sticky;
  top: 0;
}

input {
  width: 100%;
  padding: 12px;
  font-size: 16px;
  border: none;
  outline: none;
}

#list {
  padding: 10px;
}

.song {
  background: white;
  margin-bottom: 8px;
  padding: 12px;
  border-radius: 8px;
  font-size: 16px;
}

.song:active {
  background: #e0e0e0;
}

#letra {
  padding: 12px;
  background: white;
  border-radius: 8px;
  margin: 10px;
  white-space: pre-wrap;
  line-height: 1.5;
  font-size: 16px;
}

button {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  font-size: 16px;
  background: #2e7d32;
  color: white;
  border: none;
  border-radius: 8px;
}
</style>
</head>

<body>

<header>📖 Coros</header>

<input type="text" id="search" placeholder="Buscar coro...">

<div id="list"></div>
<div id="letra"></div>

<script src="songs.js"></script>
<script>
const list = document.getElementById("list");
const letraDiv = document.getElementById("letra");
const search = document.getElementById("search");

function render(filter="") {
  list.innerHTML = "";
  letraDiv.innerHTML = "";
  const f = filter.toLowerCase();

  songs.filter(s => s.titulo.toLowerCase().includes(f))
       .forEach(song => {
         const div = document.createElement("div");
         div.className = "song";
         div.textContent = song.titulo;
         div.onclick = () => {
           letraDiv.textContent = song.letra;
           window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" });
         };
         list.appendChild(div);
       });
}

search.oninput = () => render(search.value);
render();

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
